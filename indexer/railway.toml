# Railway configuration for StakeHub Indexer
# Deploy to Railway: https://railway.app

[build]
  builder = "NIXPACKS"
  buildCommand = "npm install"

[deploy]
  startCommand = "npm run dev"
  healthcheckPath = "/"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 5
